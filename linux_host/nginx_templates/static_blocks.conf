location /fonts/ {
    # trailing slash

    alias /data/ofm/linux_host/assets/fonts/ofm/; # trailing slash
    try_files $uri =404;

    expires 1w;

    __PUBLIC_HEADERS__

}

location /natural_earth/ {
    # trailing slash

    alias /data/ofm/linux_host/assets/natural_earth/ofm/; # trailing slash
    try_files $uri =404;

    expires 10y;

    __PUBLIC_HEADERS__

}

location /sprites/ {
    # trailing slash

    alias /data/ofm/linux_host/assets/sprites/; # trailing slash
    try_files $uri =404;

    expires 10y;

    __PUBLIC_HEADERS__

}


# we need to handle missing tiles as valid request returning empty string
location @empty_tile {
    return 200 '';

    expires 10y;

    types {
        application/vnd.mapbox-vector-tile pbf;
    }

    __PUBLIC_HEADERS__

    add_header x-ofm-debug 'empty tile';
}

location = / {
    return 302 https://openfreemap.org;
}
